name: Wii Derleme
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc
    steps:
      - uses: actions/checkout@v2
      - name: Derle
        run: |
          make
      - name: Dosyayi Kaydet
        uses: actions/upload-artifact@v2
        with:
          name: ftf-wii-oyunu
          path: *.dol
          
